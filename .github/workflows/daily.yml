name: Daily Solar Policy Update

on:
  schedule:
    # 每天早上 8 点（北京时间 UTC+8 = UTC 0 点）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write   # 允许写入仓库内容
  pages: write      # 允许部署 GitHub Pages
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run scrapers (collect data)
        run: node scrapers/run-all.js

      - name: Generate HTML
        run: node generate-html.js

      - name: Commit and push updated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/index.html output/data.json || true
          git commit -m "🤖 每日自动更新 $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './output'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
